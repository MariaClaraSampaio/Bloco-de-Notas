<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Blossom Notes</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div>

        <div class="logo">

          <div class="logo-icon">
            🌸
          </div>

          <div>

            <h2>
              Blossom
            </h2>

            <p>
              Notes
            </p>

          </div>

        </div>

        <nav class="menu">

          <button class="active">
            ✨ Dashboard
          </button>

          <button>
            📝 Notas
          </button>

          <button>
            🌷 Organização
          </button>

          <button>
            📚 Estudos
          </button>

        </nav>

      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        Sair
      </button>

    </aside>

    <!-- MAIN -->

    <main class="main">

      <!-- TOPBAR -->

      <div class="topbar">

        <div>

          <h1>
            Olá 🌸
          </h1>

          <p>
            Organize suas ideias de forma bonita.
          </p>

        </div>

        <div class="top-actions">

          <input
            type="text"
            placeholder="Buscar notas..."
          >

        </div>

      </div>

      <!-- HERO -->

      <section class="hero">

        <div>

          <span>
            Blossom Notes
          </span>

          <h2>
            Seu espaço criativo
          </h2>

          <p>
            Salve ideias, estudos e lembretes em um só lugar.
          </p>

        </div>

        <div class="hero-flower">
          🌷
        </div>

      </section>

      <!-- CREATE -->

      <section class="create-note">

        <input
          id="title"
          placeholder="Título da nota"
        >

        <textarea
          id="content"
          placeholder="Escreva algo..."
        ></textarea>

        <button onclick="createNote()">
          + Salvar Nota
        </button>

      </section>

      <!-- NOTES -->

      <section>

        <div class="section-title">

          <h2>
            Minhas Notas
          </h2>

          <span id="totalNotes">
            0 notas
          </span>

        </div>

        <div
          id="notes"
          class="notes-grid"
        ></div>

      </section>

    </main>

  </div>

  <script src="js/dashboard.js"></script>

</body>

</html>
